version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lab_resultados}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lab_user} -d ${POSTGRES_DB:-lab_resultados}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-lab_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-lab_resultados}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      - LAB_NAME=${LAB_NAME:-Laboratorio Clínico}
      - LAB_ADDRESS=${LAB_ADDRESS:-Av. Gómez Morín S/N Col. la Estación C.P. 20180, Aguascalientes, Ags. Fideicomiso complejo Tres Centurias (a un costado del CHMH)}
      - LAB_PHONE=${LAB_PHONE:-449 459 57 97}
      - LAB_EMAIL=${LAB_EMAIL:-inaer.resultados@aguascalientes.gob.mx}
      - MOCK_EMAIL=${MOCK_EMAIL:-true}
      - MOCK_WHATSAPP=${MOCK_WHATSAPP:-true}
      - PDF_STORAGE_PATH=/app/storage/pdfs
      - BASE_URL=${BACKEND_BASE_URL:-http://localhost:8000}
    volumes:
      - pdf_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      - backend

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - WEBHOOK_URL=${N8N_PUBLIC_URL:-http://localhost:5678}
      - N8N_SECURE_COOKIE=false
      - N8N_RESTRICT_FILE_ACCESS_TO=/home/node/.n8n-files;/data/pdfs;/data/cola_envio
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_DEFAULT_BINARY_DATA_MODE=default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n
      - cola_envio:/data/cola_envio
      - pdf_storage:/data/pdfs:ro
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - n8n

  ews:
    build:
      context: ./backend/email_service
      dockerfile: Dockerfile
    env_file:
      - ./backend/email_service/.env
    environment:
      - EWS_USERNAME=${EWS_USERNAME}
      - EWS_PASSWORD=${EWS_PASSWORD}
      - EWS_API_KEY=${EWS_API_KEY}
      - EWS_URL=${EWS_URL}
    volumes:
      - /data/pdfs:/app/data/pdfs
    networks:
      - default
    restart: unless-stopped

volumes:
  postgres_data:
    external: true
    name: postgres_data_local
  pdf_storage:
    external: true
    name: pdf_storage_local
  cola_envio:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${CIFS_USER},password=${CIFS_PASSWORD},domain=${CIFS_DOMAIN:-WORKGROUP},vers=${CIFS_VERS:-3.0}"
      device: "${CIFS_DEVICE}"
  n8n_data:
    external: true
    name: n8n_data_local
